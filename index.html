<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayaan Merchant — Coming Soon</title>
    <meta name="description" content="Ayaan Merchant's portfolio is coming soon. Stay tuned for something amazing.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: #fff;
            cursor: default;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .content {
            text-align: center;
            pointer-events: auto;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
            padding: 0 24px;
            max-width: 100%;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greeting {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(14px, 2vw, 18px);
            font-weight: 500;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(48px, 10vw, 120px);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 0%, #a78bfa 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
        }

        .tagline {
            font-size: clamp(16px, 3vw, 24px);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
        }

        .coming-soon-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 50px;
            background: rgba(99, 102, 241, 0.08);
            backdrop-filter: blur(20px);
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(13px, 1.8vw, 16px);
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #a78bfa;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
            position: relative;
            overflow: hidden;
        }

        .coming-soon-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(167, 139, 250, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .socials {
            display: flex;
            gap: 24px;
            margin-top: 40px;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards;
        }

        .socials a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: color 0.3s ease, transform 0.3s ease;
            pointer-events: auto;
        }

        .socials a:hover {
            color: #a78bfa;
            transform: translateY(-2px);
        }

        .mouse-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: left 0.3s ease, top 0.3s ease;
        }

        .corner-decoration {
            position: fixed;
            z-index: 2;
            color: rgba(255, 255, 255, 0.08);
            font-family: 'Space Grotesk', monospace;
            font-size: 11px;
            letter-spacing: 2px;
        }

        .corner-tl { top: 30px; left: 30px; }
        .corner-br { bottom: 30px; right: 30px; }

        /* ── Tablet ── */
        @media (max-width: 1024px) {
            .name { letter-spacing: -1px; }
            .coming-soon-badge { padding: 12px 26px; letter-spacing: 2px; }
            .mouse-glow { display: none; }
        }

        /* ── Mobile landscape + small tablets ── */
        @media (max-width: 768px) {
            .content { padding: 0 20px; }
            .greeting { letter-spacing: 4px; margin-bottom: 14px; }
            .name { letter-spacing: -1px; margin-bottom: 12px; }
            .tagline { margin-bottom: 36px; }
            .coming-soon-badge { padding: 11px 22px; letter-spacing: 2px; gap: 8px; }
            .socials { gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 32px; }
            .corner-decoration { display: none; }
            .mouse-glow { display: none; }
        }

        /* ── Small phones ── */
        @media (max-width: 480px) {
            .content { padding: 0 16px; }
            .greeting { font-size: 12px; letter-spacing: 3px; margin-bottom: 12px; }
            .name { font-size: clamp(36px, 12vw, 52px); letter-spacing: -1px; margin-bottom: 10px; }
            .tagline { font-size: 15px; margin-bottom: 28px; }
            .coming-soon-badge { padding: 10px 20px; font-size: 12px; letter-spacing: 2px; }
            .pulse-dot { width: 6px; height: 6px; }
            .socials { gap: 16px; margin-top: 28px; }
            .socials a { font-size: 13px; }
        }

        /* ── Very small phones (SE, mini) ── */
        @media (max-width: 360px) {
            .name { font-size: clamp(30px, 11vw, 42px); }
            .tagline { font-size: 14px; margin-bottom: 24px; }
            .coming-soon-badge { padding: 9px 16px; font-size: 11px; }
            .socials a { font-size: 12px; }
        }

        /* ── Short screens / landscape phones ── */
        @media (max-height: 500px) {
            .greeting { margin-bottom: 8px; font-size: 11px; }
            .name { font-size: clamp(28px, 7vw, 48px); margin-bottom: 8px; }
            .tagline { font-size: 14px; margin-bottom: 16px; }
            .coming-soon-badge { padding: 8px 18px; font-size: 11px; }
            .socials { margin-top: 16px; }
        }

        /* ── Touch devices: disable hover effects, hide mouse glow ── */
        @media (hover: none) and (pointer: coarse) {
            .mouse-glow { display: none; }
            .socials a:hover { transform: none; }
            .socials a:active { color: #a78bfa; }
        }

        /* ── High DPI small screens: reduce particle load via CSS hint ── */
        @media (max-width: 480px) and (-webkit-min-device-pixel-ratio: 2) {
            #bg-canvas { image-rendering: optimizeSpeed; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="mouse-glow" id="mouseGlow"></div>

    <div class="overlay">
        <div class="content">
            <div class="greeting">Hello, World</div>
            <h1 class="name">Ayaan Merchant</h1>
            <p class="tagline">Something amazing is being crafted.</p>
            <div class="coming-soon-badge">
                <span class="pulse-dot"></span>
                Coming Soon
            </div>
            <div class="socials">
                <a href="https://github.com/AyaanMerchant" target="_blank" rel="noopener">GitHub</a>
                <a href="https://linkedin.com/in/ayaanmerchant" target="_blank" rel="noopener">LinkedIn</a>
            </div>
        </div>
    </div>

    <div class="corner-decoration corner-tl">PORTFOLIO / 2026</div>
    <div class="corner-decoration corner-br">AYAANMERCHANT.ME</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ── Responsive helpers ──
        const isMobile = window.innerWidth <= 768;
        const isSmallPhone = window.innerWidth <= 480;
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // ── Three.js Particle Background ──
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = isMobile ? 60 : 50;

        // Particles — fewer on mobile for performance
        const PARTICLE_COUNT = isSmallPhone ? 800 : isMobile ? 1200 : 2000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const sizes = new Float32Array(PARTICLE_COUNT);

        const palette = [
            new THREE.Color(0x6366f1), // indigo
            new THREE.Color(0xa78bfa), // violet
            new THREE.Color(0x818cf8), // light indigo
            new THREE.Color(0xc4b5fd), // lavender
            new THREE.Color(0x4f46e5), // deep indigo
        ];

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const i3 = i * 3;
            positions[i3]     = (Math.random() - 0.5) * 120;
            positions[i3 + 1] = (Math.random() - 0.5) * 120;
            positions[i3 + 2] = (Math.random() - 0.5) * 80;

            velocities[i3]     = (Math.random() - 0.5) * 0.02;
            velocities[i3 + 1] = (Math.random() - 0.5) * 0.02;
            velocities[i3 + 2] = (Math.random() - 0.5) * 0.01;

            const color = palette[Math.floor(Math.random() * palette.length)];
            colors[i3]     = color.r;
            colors[i3 + 1] = color.g;
            colors[i3 + 2] = color.b;

            sizes[i] = Math.random() * 2 + 0.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uMouse: { value: new THREE.Vector2(0, 0) },
            },
            vertexShader: `
                attribute float size;
                varying vec3 vColor;
                varying float vAlpha;
                uniform float uTime;
                uniform vec2 uMouse;

                void main() {
                    vColor = color;

                    vec3 pos = position;
                    pos.x += sin(uTime * 0.3 + position.y * 0.05) * 1.5;
                    pos.y += cos(uTime * 0.2 + position.x * 0.05) * 1.5;
                    pos.z += sin(uTime * 0.15 + position.x * 0.03) * 1.0;

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    float dist = length(mvPosition.xyz);
                    vAlpha = smoothstep(80.0, 20.0, dist) * 0.8;

                    gl_PointSize = size * (40.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vAlpha;

                void main() {
                    float d = length(gl_PointCoord - vec2(0.5));
                    if (d > 0.5) discard;
                    float alpha = smoothstep(0.5, 0.1, d) * vAlpha;
                    gl_FragColor = vec4(vColor, alpha);
                }
            `,
            transparent: true,
            vertexColors: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
        });

        const particles = new THREE.Points(geometry, particleMaterial);
        scene.add(particles);

        // ── Connection Lines (fewer on mobile) ──
        const lineGeometry = new THREE.BufferGeometry();
        const MAX_LINES = isMobile ? 300 : 800;
        const linePositions = new Float32Array(MAX_LINES * 6);
        const lineColors = new Float32Array(MAX_LINES * 6);
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        lineGeometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));

        const lineMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.15,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
        });

        const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lines);

        // ── Floating ring geometry (scaled for screen) ──
        const ringScale = isMobile ? 0.7 : 1;
        const ringGeo = new THREE.TorusGeometry(18 * ringScale, 0.05, 16, isMobile ? 64 : 100);
        const ringMat = new THREE.MeshBasicMaterial({
            color: 0x6366f1,
            transparent: true,
            opacity: 0.08,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI * 0.5;
        scene.add(ring);

        const ring2Geo = new THREE.TorusGeometry(25 * ringScale, 0.03, 16, isMobile ? 64 : 100);
        const ring2Mat = new THREE.MeshBasicMaterial({
            color: 0xa78bfa,
            transparent: true,
            opacity: 0.04,
        });
        const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
        ring2.rotation.x = Math.PI * 0.6;
        ring2.rotation.z = Math.PI * 0.2;
        scene.add(ring2);

        // ── Mouse / Touch tracking ──
        const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };

        document.addEventListener('mousemove', (e) => {
            mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;

            const glow = document.getElementById('mouseGlow');
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Touch support — gentle parallax on mobile via gyroscope/touch
        if (isTouchDevice) {
            document.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                mouse.targetX = (touch.clientX / window.innerWidth) * 2 - 1;
                mouse.targetY = -(touch.clientY / window.innerHeight) * 2 + 1;
            }, { passive: true });

            // Device orientation for subtle parallax on mobile
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    if (e.gamma !== null && e.beta !== null) {
                        mouse.targetX = Math.max(-1, Math.min(1, e.gamma / 30));
                        mouse.targetY = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
                    }
                }, { passive: true });
            }
        }

        // ── Resize (with debounce) ──
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, window.innerWidth <= 768 ? 1.5 : 2));
            }, 150);
        });

        // ── Animation loop ──
        const clock = new THREE.Clock();

        function updateLines() {
            const pos = geometry.attributes.position.array;
            let lineIdx = 0;
            const threshold = 12;

            for (let i = 0; i < PARTICLE_COUNT && lineIdx < MAX_LINES; i += 4) {
                for (let j = i + 4; j < PARTICLE_COUNT && lineIdx < MAX_LINES; j += 4) {
                    const i3 = i * 3, j3 = j * 3;
                    const dx = pos[i3] - pos[j3];
                    const dy = pos[i3+1] - pos[j3+1];
                    const dz = pos[i3+2] - pos[j3+2];
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    if (dist < threshold) {
                        const li = lineIdx * 6;
                        linePositions[li]   = pos[i3];
                        linePositions[li+1] = pos[i3+1];
                        linePositions[li+2] = pos[i3+2];
                        linePositions[li+3] = pos[j3];
                        linePositions[li+4] = pos[j3+1];
                        linePositions[li+5] = pos[j3+2];

                        const alpha = 1 - dist / threshold;
                        lineColors[li]   = 0.39 * alpha;
                        lineColors[li+1] = 0.4 * alpha;
                        lineColors[li+2] = 0.95 * alpha;
                        lineColors[li+3] = 0.39 * alpha;
                        lineColors[li+4] = 0.4 * alpha;
                        lineColors[li+5] = 0.95 * alpha;

                        lineIdx++;
                    }
                }
            }

            lineGeometry.setDrawRange(0, lineIdx * 2);
            lineGeometry.attributes.position.needsUpdate = true;
            lineGeometry.attributes.color.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);

            const elapsed = clock.getElapsedTime();
            particleMaterial.uniforms.uTime.value = elapsed;

            // Smooth mouse follow
            mouse.x += (mouse.targetX - mouse.x) * 0.05;
            mouse.y += (mouse.targetY - mouse.y) * 0.05;
            particleMaterial.uniforms.uMouse.value.set(mouse.x, mouse.y);

            // Gentle camera sway (reduced on mobile)
            const swayAmount = isMobile ? 0.4 : 1;
            camera.position.x = mouse.x * 5 * swayAmount;
            camera.position.y = mouse.y * 3 * swayAmount;
            camera.lookAt(0, 0, 0);

            // Rotate particles slowly
            particles.rotation.y = elapsed * 0.02;
            particles.rotation.x = Math.sin(elapsed * 0.01) * 0.1;

            // Animate rings
            ring.rotation.z = elapsed * 0.1;
            ring.position.y = Math.sin(elapsed * 0.3) * 2;

            ring2.rotation.z = -elapsed * 0.07;
            ring2.rotation.x = Math.PI * 0.6 + Math.sin(elapsed * 0.2) * 0.1;

            // Update connection lines (less often on mobile for perf)
            const lineUpdateRate = isMobile ? 5 : 3;
            if (Math.floor(elapsed * 10) % lineUpdateRate === 0) {
                updateLines();
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
